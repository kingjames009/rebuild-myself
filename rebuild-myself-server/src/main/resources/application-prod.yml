server:
  port: 8080

spring:
  application:
    name: rebuild-myself-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/rebuild_myself?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:CHANGEME_IN_ENV_FILE}
    password: ${DB_PASSWORD:CHANGEME_IN_ENV_FILE}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

jwt:
  secret: ${JWT_SECRET:CHANGEME_IN_ENV_FILE}
  expiration: 604800000

ai:
  api-url: https://api.deepseek.com/v1/chat/completions
  api-key: ${AI_API_KEY:CHANGEME_IN_ENV_FILE}
  model: deepseek-chat

file:
  upload-path: /data/rebuild-myself/uploads
  max-size: 10MB
