name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]
    paths:
      - 'rebuild-myself-server/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B -DskipTests clean package -Pprod
        working-directory: rebuild-myself-server

      - name: Decode SSH key
        run: |
          echo "${{ secrets.ALIYUN_SSH_KEY }}" | base64 -d > deploy_key
          chmod 644 deploy_key

      - name: Upload JAR + migrations to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key_path: /github/workspace/deploy_key
          port: 22
          source: "rebuild-myself-server/target/rebuild-myself-server-1.0.0.jar,rebuild-myself-server/deploy/migration_001_reminders.sql"
          target: "/data/rebuild-myself"
          strip_components: 3

      - name: Run DB migration + Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key_path: /github/workspace/deploy_key
          port: 22
          script: |
            echo "=== Running DB migrations ==="
            source /data/rebuild-myself/env.sh
            MIGRATION_FILE="/data/rebuild-myself/migration_001_reminders.sql"
            if [ -f "$MIGRATION_FILE" ]; then
              mysql -u "$DB_USERNAME" -p"$DB_PASSWORD" rebuild_myself < "$MIGRATION_FILE" && echo "Migration OK" || echo "Migration skipped (may already exist)"
            fi

            echo "=== Restarting service ==="
            systemctl daemon-reload
            systemctl restart rebuild-myself
            sleep 5
            echo "=== Service status ==="
            systemctl status rebuild-myself --no-pager --lines=5
            echo "=== Health check ==="
            curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:8080/index.html || echo "Health check failed"
